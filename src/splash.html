<!doctype html>
<html>
  <head>
    <style>
      :root {
        --bg: #ffffff;
        --blue: #1a6ef5;
        --accent: #2563eb;
        --text: #111827;
        --text-dim: #6b7280;
        --track: #f3f4f6;
      }
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        font-family:
          'Inter',
          'Segoe UI',
          system-ui,
          -apple-system,
          sans-serif;
        overflow: hidden;
        user-select: none;
        -webkit-app-region: drag;
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .logo-box {
        width: 120px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pulse 2.5s infinite ease-in-out;
      }
      .logo-box svg {
        width: 44px;
        height: 44px;
        fill: white;
      }
      .title {
        font-size: 28px;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.8px;
        margin-top: 10px;
      }
      .subtitle {
        font-size: 14px;
        color: var(--text-dim);
        margin-top: -6px;
        font-weight: 500;
      }
      .loader-wrap {
        width: 280px;
        height: 6px;
        background: var(--track);
        border-radius: 10px;
        margin-top: 30px;
        overflow: hidden;
        position: relative;
      }
      .loader-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 0%;
        background: var(--blue);
        border-radius: 10px;
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .status {
        font-size: 10px;
        color: var(--text-dim);
        margin-top: 12px;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.2px;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.03);
          opacity: 0.95;
        }
      }
      .fade-in {
        animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="container fade-in">
      <div class="logo-box">
        <img src="assets/logo.png" style="width: 100px; height: 100px; object-fit: contain" />
      </div>
      <div class="title">CXI SLT Toolkit</div>
      <div class="subtitle">Advanced IT Diagnostics & Optimization</div>

      <div class="loader-wrap">
        <div class="loader-bar" id="bar"></div>
      </div>
      <div class="status" id="status">Initializing modules...</div>
    </div>

    <script>
      const bar = document.getElementById('bar');
      const status = document.getElementById('status');
      
      const initialSteps = [
        { p: 10, t: 'Loading core components...' },
        { p: 25, t: 'Verifying system permissions...' },
        { p: 45, t: 'Initializing diagnostic modules...' },
        { p: 65, t: 'Connecting to system interfaces...' },
        { p: 85, t: 'Preparing workspace...' },
        { p: 95, t: 'Almost ready...' }
      ];

      let step = -1;
      function runInitial() {
        step++;
        if (step < initialSteps.length) {
          bar.style.width = initialSteps[step].p + '%';
          status.textContent = initialSteps[step].t;
          
          // Vary the timing for a more "active" look
          const delay = 600 + Math.random() * 800;
          setTimeout(runInitial, delay);
        }
      }
      runInitial();
    </script>
  </body>
</html>
